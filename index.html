<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developers</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-neutral-950 text-white min-h-full flex flex-col items-center justify-start py-16 px-4">

  <!-- ===== Intro Animation Overlay ===== -->
  <div id="intro-overlay">
    <div class="intro-title">
      <span class="intro-letter" style="animation-delay: 0.10s">D</span>
      <span class="intro-letter" style="animation-delay: 0.22s">E</span>
      <span class="intro-letter" style="animation-delay: 0.34s">V</span>
      <span class="intro-letter" style="animation-delay: 0.46s">E</span>
      <span class="intro-letter" style="animation-delay: 0.58s">L</span>
      <span class="intro-letter" style="animation-delay: 0.70s">O</span>
      <span class="intro-letter" style="animation-delay: 0.82s">P</span>
      <span class="intro-letter" style="animation-delay: 0.94s">E</span>
      <span class="intro-letter" style="animation-delay: 1.06s">R</span>
      <span class="intro-letter" style="animation-delay: 1.18s">S</span>
    </div>
    <div class="intro-line"></div>
    <p class="intro-subtitle">Arvid Södergård</p>
  </div>

  <!-- ===== Main Content ===== -->
  <div id="main-content" style="opacity: 0; width: 100%; display: flex; flex-direction: column; align-items: center;">

  <h1 class="text-4xl font-bold tracking-widest uppercase mb-2">Developers</h1>
  <p class="text-neutral-400 text-sm mb-10">Video Player</p>

  <!-- Tab buttons -->
  <div class="flex gap-3 mb-6">
    <button
      id="btn-developers"
      onclick="switchVideo('developers')"
      class="px-5 py-2 rounded-full text-sm font-semibold transition-all duration-200 bg-white text-neutral-950 shadow-lg"
    >
      Developers
    </button>
    <button
      id="btn-videoplayback"
      onclick="switchVideo('videoplayback')"
      class="px-5 py-2 rounded-full text-sm font-semibold transition-all duration-200 bg-neutral-800 text-neutral-300 hover:bg-neutral-700 ring-1 ring-white/10"
    >
      Dancing
    </button>
  </div>

  <div class="w-full max-w-4xl rounded-2xl overflow-hidden shadow-2xl bg-neutral-900 ring-1 ring-white/10">
    <video
      id="main-video"
      class="w-full block"
      controls
      playsinline
      loop
      src="public/developers.mp4"
    >
      Your browser does not support the video tag.
    </video>
  </div>

  </div><!-- /#main-content -->

  <script>
    const videos = {
      developers: '/Developers/developers.mp4',
      videoplayback: '/Developers/videoplayback.mp4',
    };

    // ===== Intro animation control =====
    (function () {
      const overlay = document.getElementById('intro-overlay');
      const content = document.getElementById('main-content');
      // Trigger curtain exit + content entrance
      setTimeout(function () {
        overlay.style.animation = 'introExit 0.85s cubic-bezier(0.76, 0, 0.24, 1) forwards';
        content.style.animation = 'contentEnter 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards';
      }, 3200);
      // Remove overlay from DOM after it has exited
      setTimeout(function () {
        overlay.remove();
      }, 4200);
    })();

    function switchVideo(key) {
      const video = document.getElementById('main-video');
      const wasPlaying = !video.paused;
      video.src = videos[key];
      video.load();
      if (wasPlaying) video.play();

      // Update button styles
      Object.keys(videos).forEach(k => {
        const btn = document.getElementById('btn-' + k);
        if (k === key) {
          btn.className = 'px-5 py-2 rounded-full text-sm font-semibold transition-all duration-200 bg-white text-neutral-950 shadow-lg';
        } else {
          btn.className = 'px-5 py-2 rounded-full text-sm font-semibold transition-all duration-200 bg-neutral-800 text-neutral-300 hover:bg-neutral-700 ring-1 ring-white/10';
        }
      });
    }
  </script>
</body>
</html>
