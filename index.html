<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developers</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-neutral-950 text-white min-h-full flex flex-col items-center justify-start py-16 px-4">

  <h1 class="text-4xl font-bold tracking-widest uppercase mb-2">Developers</h1>
  <p class="text-neutral-400 text-sm mb-10">Video Player</p>

  <!-- Tab buttons -->
  <div class="flex gap-3 mb-6">
    <button
      id="btn-developers"
      onclick="switchVideo('developers')"
      class="tab-btn px-5 py-2 rounded-full text-sm font-semibold bg-white text-neutral-950 shadow-lg"
    >
      Developers
    </button>
    <button
      id="btn-videoplayback"
      onclick="switchVideo('videoplayback')"
      class="tab-btn px-5 py-2 rounded-full text-sm font-semibold bg-neutral-800 text-neutral-300 hover:bg-neutral-700 ring-1 ring-white/10"
    >
      Dancing
    </button>
  </div>

  <div class="w-full max-w-4xl rounded-2xl overflow-hidden shadow-2xl bg-neutral-900 ring-1 ring-white/10">
    <video
      id="main-video"
      class="w-full block"
      controls
      playsinline
      loop
      src="public/developers.mp4"
    >
      Your browser does not support the video tag.
    </video>
  </div>

  <script>
    const videos = {
      developers: '/Developers/developers.mp4',
      videoplayback: '/Developers/videoplayback.mp4',
    };

    function switchVideo(key) {
      const video = document.getElementById('main-video');
      const wasPlaying = !video.paused;

      // Fade out, swap src, fade back in
      video.classList.add('switching');
      setTimeout(() => {
        video.src = videos[key];
        video.load();
        if (wasPlaying) video.play();
        video.classList.remove('switching');
      }, 260);

      // Update button styles
      Object.keys(videos).forEach(k => {
        const btn = document.getElementById('btn-' + k);
        if (k === key) {
          btn.className = 'tab-btn px-5 py-2 rounded-full text-sm font-semibold bg-white text-neutral-950 shadow-lg';
        } else {
          btn.className = 'tab-btn px-5 py-2 rounded-full text-sm font-semibold bg-neutral-800 text-neutral-300 hover:bg-neutral-700 ring-1 ring-white/10';
        }
      });
    }
  </script>
</body>
</html>
