<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developers</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-neutral-950 text-white min-h-full flex flex-col items-center justify-start py-16 px-4">

  <!-- ===== Intro Animation Overlay ===== -->
  <div id="intro-overlay">
    <div class="intro-title">
      <span class="intro-letter" style="animation-delay: 0.10s">D</span>
      <span class="intro-letter" style="animation-delay: 0.22s">E</span>
      <span class="intro-letter" style="animation-delay: 0.34s">V</span>
      <span class="intro-letter" style="animation-delay: 0.46s">E</span>
      <span class="intro-letter" style="animation-delay: 0.58s">L</span>
      <span class="intro-letter" style="animation-delay: 0.70s">O</span>
      <span class="intro-letter" style="animation-delay: 0.82s">P</span>
      <span class="intro-letter" style="animation-delay: 0.94s">E</span>
      <span class="intro-letter" style="animation-delay: 1.06s">R</span>
      <span class="intro-letter" style="animation-delay: 1.18s">S</span>
    </div>
    <div class="intro-line"></div>
    <p class="intro-subtitle">Arvid Södergård</p>
  </div>

  <!-- ===== Main Content ===== -->
  <div id="main-content" style="opacity: 0; width: 100%; display: flex; flex-direction: column; align-items: center;">

  <h1 class="text-4xl font-bold tracking-widest uppercase mb-2">Developers</h1>
  <p class="text-neutral-400 text-sm mb-10">Video Player</p>

  <!-- Tab buttons -->
  <div class="flex gap-3 mb-6">
    <button
      id="btn-developers"
      onclick="switchVideo('developers')"
      class="tab-btn px-5 py-2 rounded-full text-sm font-semibold bg-white text-neutral-950 shadow-lg"
    >
      Developers
    </button>
    <button
      id="btn-videoplayback"
      onclick="switchVideo('videoplayback')"
      class="tab-btn px-5 py-2 rounded-full text-sm font-semibold bg-neutral-800 text-neutral-300 hover:bg-neutral-700 ring-1 ring-white/10"
    >
      Dancing
    </button>
  </div>

  <div class="w-full max-w-4xl rounded-2xl overflow-hidden shadow-2xl bg-neutral-900 ring-1 ring-white/10">
    <video
      id="main-video"
      class="w-full block"
      controls
      playsinline
      loop
      src="public/developers.mp4"
    >
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Keyboard hints -->
  <p class="mt-4 text-neutral-600 text-xs tracking-widest select-none">
    <span class="text-neutral-500">SPACE</span> play/pause &nbsp;·&nbsp;
    <span class="text-neutral-500">← →</span> seek 5s &nbsp;·&nbsp;
    <span class="text-neutral-500">↑ ↓</span> volume &nbsp;·&nbsp;
    <span class="text-neutral-500">M</span> mute &nbsp;·&nbsp;
    <span class="text-neutral-500">F</span> fullscreen
  </p>

  </div><!-- /#main-content -->

  <script>
    const videos = {
      developers: '/Developers/developers.mp4',
      videoplayback: '/Developers/videoplayback.mp4',
    };

    // ===== Intro animation control =====
    (function () {
      const overlay = document.getElementById('intro-overlay');
      const content = document.getElementById('main-content');
      // Trigger curtain exit + content entrance
      setTimeout(function () {
        overlay.style.animation = 'introExit 0.85s cubic-bezier(0.76, 0, 0.24, 1) forwards';
        content.style.animation = 'contentEnter 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards';
      }, 3200);
      // Remove overlay from DOM after it has exited
      setTimeout(function () {
        overlay.remove();
      }, 4200);
    })();

    // ===== Keyboard shortcuts =====
    // Seek helper: pause → seek → resume on seeked to prevent audio/video desync
    function seekVideo(video, time) {
      const wasPlaying = !video.paused;
      const seekingBack = time < video.currentTime;
      if (wasPlaying) video.pause();
      video.currentTime = time;
      if (wasPlaying) {
        // Backward seeks require re-decoding from a keyframe — wait for canplay
        // so the frame is actually ready before audio resumes.
        const resumeEvent = seekingBack ? 'canplay' : 'seeked';
        video.addEventListener(resumeEvent, function resume() {
          video.removeEventListener(resumeEvent, resume);
          video.play();
        });
      }
    }

    document.addEventListener('keydown', function (e) {
      // Don't hijack shortcuts when the user is typing in a form field
      if (e.target.matches('input, textarea, select, button')) return;

      const video = document.getElementById('main-video');
      switch (e.key) {
        case ' ':
        case 'Spacebar':
          e.preventDefault();
          video.paused ? video.play() : video.pause();
          break;
        case 'ArrowRight':
          e.preventDefault();
          seekVideo(video, Math.min(video.currentTime + 5, video.duration));
          break;
        case 'ArrowLeft':
          e.preventDefault();
          seekVideo(video, Math.max(video.currentTime - 5, 0));
          break;
        case 'ArrowUp':
          e.preventDefault();
          video.volume = Math.min(video.volume + 0.1, 1);
          break;
        case 'ArrowDown':
          e.preventDefault();
          video.volume = Math.max(video.volume - 0.1, 0);
          break;
        case 'm':
        case 'M':
          video.muted = !video.muted;
          break;
        case 'f':
        case 'F':
          video.requestFullscreen && video.requestFullscreen();
          break;
      }
    });

    function switchVideo(key) {
      const video = document.getElementById('main-video');
      const wasPlaying = !video.paused;

      // Fade out, swap src, fade back in
      video.classList.add('switching');
      setTimeout(() => {
        video.src = videos[key];
        video.load();
        if (wasPlaying) video.play();
        video.classList.remove('switching');
      }, 260);

      // Update button styles
      Object.keys(videos).forEach(k => {
        const btn = document.getElementById('btn-' + k);
        if (k === key) {
          btn.className = 'tab-btn px-5 py-2 rounded-full text-sm font-semibold bg-white text-neutral-950 shadow-lg';
        } else {
          btn.className = 'tab-btn px-5 py-2 rounded-full text-sm font-semibold bg-neutral-800 text-neutral-300 hover:bg-neutral-700 ring-1 ring-white/10';
        }
      });
    }
  </script>
</body>
</html>
